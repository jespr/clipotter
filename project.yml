name: ClipOtter
options:
  bundleIdPrefix: com.jespr
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  ClipOtter:
    type: application
    platform: macOS
    sources:
      - path: ClipOtter
    dependencies:
      - package: Sparkle
    info:
      path: ClipOtter/Info.plist
      properties:
        CFBundleName: ClipOtter
        CFBundleDisplayName: ClipOtter
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSApplicationCategoryType: public.app-category.productivity
        NSHumanReadableCopyright: ""
        NSHighResolutionCapable: true
        NSSpeechRecognitionUsageDescription: "ClipOtter uses on-device speech recognition to transcribe your media files locally. Nothing is sent off your Mac."
        # Sparkle auto-update — see scripts/release.sh
        SUFeedURL: https://clipotter.app/appcast.xml
        SUPublicEDKey: WrE6/SekNiS/4wlHuPXo9gKANTiMxV1hvOA4fArJC8M=
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jespr.ClipOtter
        PRODUCT_NAME: ClipOtter
        MARKETING_VERSION: "0.7.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: CA629ESX52
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Automatic
