name: Transcript
options:
  bundleIdPrefix: com.jespr
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  Transcript:
    type: application
    platform: macOS
    sources:
      - path: Transcript
    dependencies:
      - package: Sparkle
    info:
      path: Transcript/Info.plist
      properties:
        CFBundleName: Transcript
        CFBundleDisplayName: Transcript
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSApplicationCategoryType: public.app-category.productivity
        NSHumanReadableCopyright: ""
        NSHighResolutionCapable: true
        NSSpeechRecognitionUsageDescription: "Transcript uses on-device speech recognition to transcribe your media files locally. Nothing is sent off your Mac."
        # Sparkle auto-update — see scripts/release.sh
        SUFeedURL: https://jespr.github.io/transcript/appcast.xml
        SUPublicEDKey: WrE6/SekNiS/4wlHuPXo9gKANTiMxV1hvOA4fArJC8M=
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jespr.Transcript
        PRODUCT_NAME: Transcript
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        ENABLE_HARDENED_RUNTIME: YES
        DEVELOPMENT_TEAM: CA629ESX52
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Automatic
